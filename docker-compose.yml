services:
  trasck-service:
    build: .
    ports:
      - "6100:6100"
    container_name: trasck-service
    depends_on:
      - trasck-db
      - maildev
    environment:
      SPRING_APPLICATION_NAME: ${SPRING_APPLICATION_NAME:-trasck}
      SERVER_PORT: ${SERVER_PORT:-6100}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      SPRING_DATASOURCE_URL: jdbc:postgresql://trasck-db:5432/${POSTGRES_DB:-trasck}
      SPRING_DATASOURCE_DRIVER: ${SPRING_DATASOURCE_DRIVER:-org.postgresql.Driver}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-trasck}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-trasck}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: ${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:-true}
      SPRING_JPA_OPEN_IN_VIEW: ${SPRING_JPA_OPEN_IN_VIEW:-false}
      TRASCK_JWT_SECRET: ${TRASCK_JWT_SECRET:-dev-only-change-me-dev-only-change-me-dev-only-change-me-32}
      TRASCK_SECRETS_ENCRYPTION_KEY: ${TRASCK_SECRETS_ENCRYPTION_KEY:-dev-only-change-me-dev-only-change-me-dev-only-change-me-32}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-maildev}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      TRASCK_EMAIL_PROVIDER: ${TRASCK_EMAIL_PROVIDER:-maildev}
      TRASCK_EMAIL_FROM: ${TRASCK_EMAIL_FROM:-no-reply@trasck.local}
  trasck-db:
    image: 'postgres:16-alpine'
    container_name: trasck-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trasck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trasck}
      POSTGRES_DB: ${POSTGRES_DB:-trasck}
    volumes:
      - trasck-db-data:/var/lib/postgresql/data
  maildev:
    image: 'maildev/maildev:2.2.1'
    container_name: trasck-maildev
    ports:
      - "1025:1025"
      - "1080:1080"

volumes:
  trasck-db-data:
