services:
  trasck-service:
    build: .
    ports:
      - "6100:6100"
    container_name: trasck-service
    depends_on:
      - trasck-db
      - maildev
      - redis
    environment:
      SPRING_APPLICATION_NAME: ${SPRING_APPLICATION_NAME:-trasck}
      SERVER_PORT: ${SERVER_PORT:-6100}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      SPRING_DATASOURCE_URL: jdbc:postgresql://trasck-db:5432/${POSTGRES_DB:-trasck}
      SPRING_DATASOURCE_DRIVER: ${SPRING_DATASOURCE_DRIVER:-org.postgresql.Driver}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-trasck}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-trasck}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: ${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:-true}
      SPRING_JPA_OPEN_IN_VIEW: ${SPRING_JPA_OPEN_IN_VIEW:-false}
      TRASCK_JWT_SECRET: ${TRASCK_JWT_SECRET:-dev-only-change-me-dev-only-change-me-dev-only-change-me-32}
      TRASCK_SECRETS_ENCRYPTION_KEY: ${TRASCK_SECRETS_ENCRYPTION_KEY:-dev-only-change-me-dev-only-change-me-dev-only-change-me-32}
      TRASCK_AUTH_COOKIE_SECURE: ${TRASCK_AUTH_COOKIE_SECURE:-false}
      TRASCK_OAUTH_ASSERTION_SECRET: ${TRASCK_OAUTH_ASSERTION_SECRET:-}
      TRASCK_OAUTH_SUCCESS_REDIRECT: ${TRASCK_OAUTH_SUCCESS_REDIRECT:-http://localhost:8080/auth/callback}
      TRASCK_SECURITY_RATE_LIMIT_STORE: ${TRASCK_SECURITY_RATE_LIMIT_STORE:-database}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD:-}
      TRASCK_TRUST_FORWARDED_FOR: ${TRASCK_TRUST_FORWARDED_FOR:-false}
      TRASCK_OUTBOUND_URL_ALLOWED_HOSTS: ${TRASCK_OUTBOUND_URL_ALLOWED_HOSTS:-}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-maildev}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      TRASCK_EMAIL_PROVIDER: ${TRASCK_EMAIL_PROVIDER:-maildev}
      TRASCK_EMAIL_FROM: ${TRASCK_EMAIL_FROM:-no-reply@trasck.local}
      TRASCK_AGENTS_CLI_WORKER_ENABLED: ${TRASCK_AGENTS_CLI_WORKER_ENABLED:-false}
      TRASCK_AGENTS_CLI_WORKER_WORKSPACE_ROOT: ${TRASCK_AGENTS_CLI_WORKER_WORKSPACE_ROOT:-./data/agent-cli-runs}
      TRASCK_AGENTS_CLI_WORKER_TIMEOUT: ${TRASCK_AGENTS_CLI_WORKER_TIMEOUT:-PT30M}
      TRASCK_AGENTS_CLI_WORKER_MAX_CONCURRENCY: ${TRASCK_AGENTS_CLI_WORKER_MAX_CONCURRENCY:-2}
      TRASCK_AGENTS_CLI_WORKER_MAX_OUTPUT_BYTES: ${TRASCK_AGENTS_CLI_WORKER_MAX_OUTPUT_BYTES:-524288}
      TRASCK_CODEX_AGENT_COMMAND: ${TRASCK_CODEX_AGENT_COMMAND:-codex}
      TRASCK_CODEX_AGENT_ARGS: "${TRASCK_CODEX_AGENT_ARGS:-exec|-}"
      TRASCK_CODEX_AGENT_WORKDIR: ${TRASCK_CODEX_AGENT_WORKDIR:-}
      TRASCK_CODEX_AGENT_SEND_PROMPT_TO_STDIN: ${TRASCK_CODEX_AGENT_SEND_PROMPT_TO_STDIN:-true}
      TRASCK_CODEX_AGENT_CREDENTIAL_TYPES: ${TRASCK_CODEX_AGENT_CREDENTIAL_TYPES:-codex_cli_token,codex_api_key}
      TRASCK_CLAUDE_CODE_AGENT_COMMAND: ${TRASCK_CLAUDE_CODE_AGENT_COMMAND:-claude}
      TRASCK_CLAUDE_CODE_AGENT_ARGS: "${TRASCK_CLAUDE_CODE_AGENT_ARGS:--p|{prompt}}"
      TRASCK_CLAUDE_CODE_AGENT_WORKDIR: ${TRASCK_CLAUDE_CODE_AGENT_WORKDIR:-}
      TRASCK_CLAUDE_CODE_AGENT_SEND_PROMPT_TO_STDIN: ${TRASCK_CLAUDE_CODE_AGENT_SEND_PROMPT_TO_STDIN:-false}
      TRASCK_CLAUDE_CODE_AGENT_CREDENTIAL_TYPES: ${TRASCK_CLAUDE_CODE_AGENT_CREDENTIAL_TYPES:-claude_cli_token,anthropic_api_key}
  trasck-db:
    image: 'postgres:16-alpine'
    container_name: trasck-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trasck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trasck}
      POSTGRES_DB: ${POSTGRES_DB:-trasck}
    volumes:
      - trasck-db-data:/var/lib/postgresql/data
  maildev:
    image: 'maildev/maildev:2.2.1'
    container_name: trasck-maildev
    ports:
      - "1025:1025"
      - "1080:1080"
  redis:
    image: 'redis:7-alpine'
    container_name: trasck-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]

volumes:
  trasck-db-data:
