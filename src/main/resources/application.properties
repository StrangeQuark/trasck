# Application name
spring.application.name=${SPRING_APPLICATION_NAME:trasck}

# Server port
server.port = ${SERVER_PORT:6100}

# DB config
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/trasck}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:trasck}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:trasck}}

# Hibernate/JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}
spring.jpa.open-in-view=${SPRING_JPA_OPEN_IN_VIEW:false}

# Flyway migrations
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=${SPRING_FLYWAY_LOCATIONS:classpath:db/migration}

# CORS origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080}

# Auth
trasck.security.jwt-secret=${TRASCK_JWT_SECRET:dev-only-change-me-dev-only-change-me-dev-only-change-me-32}
trasck.security.access-token-ttl=${TRASCK_ACCESS_TOKEN_TTL:PT8H}
trasck.security.cookie-secure=${TRASCK_AUTH_COOKIE_SECURE:false}
trasck.security.oauth-assertion-secret=${TRASCK_OAUTH_ASSERTION_SECRET:}
trasck.security.oauth-success-redirect=${TRASCK_OAUTH_SUCCESS_REDIRECT:http://localhost:8080/auth/callback}
trasck.security.password-min-length=${TRASCK_PASSWORD_MIN_LENGTH:12}
trasck.security.login.max-failures=${TRASCK_LOGIN_MAX_FAILURES:5}
trasck.security.login.failure-window=${TRASCK_LOGIN_FAILURE_WINDOW:PT15M}
trasck.security.login.lockout-duration=${TRASCK_LOGIN_LOCKOUT_DURATION:PT15M}
trasck.security.rate-limit.store=${TRASCK_SECURITY_RATE_LIMIT_STORE:database}
trasck.security.trust-forwarded-for=${TRASCK_TRUST_FORWARDED_FOR:false}
trasck.security.outbound-url.allowed-hosts=${TRASCK_OUTBOUND_URL_ALLOWED_HOSTS:}

# Redis is only used when TRASCK_SECURITY_RATE_LIMIT_STORE=redis.
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:${REDIS_HOST:localhost}}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:${REDIS_PORT:6379}}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:${REDIS_PASSWORD:}}
spring.data.redis.repositories.enabled=false

# Secrets
trasck.secrets.encryption-key=${TRASCK_SECRETS_ENCRYPTION_KEY:${ENCRYPTION_KEY:dev-only-change-me-dev-only-change-me-dev-only-change-me-32}}
trasck.agents.callback-jwt-ttl=${TRASCK_AGENTS_CALLBACK_JWT_TTL:PT15M}

# Domain event outbox
trasck.events.outbox.fixed-delay-ms=${TRASCK_EVENTS_OUTBOX_FIXED_DELAY_MS:5000}
trasck.events.outbox.batch-size=${TRASCK_EVENTS_OUTBOX_BATCH_SIZE:50}

# Attachments
trasck.attachments.local-root=${TRASCK_ATTACHMENTS_LOCAL_ROOT:./data/attachments}
trasck.public-download.token-ttl=${TRASCK_PUBLIC_DOWNLOAD_TOKEN_TTL:PT5M}
spring.servlet.multipart.max-file-size=${TRASCK_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${TRASCK_MULTIPART_MAX_REQUEST_SIZE:12MB}
trasck.attachments.max-upload-bytes=${TRASCK_ATTACHMENTS_MAX_UPLOAD_BYTES:10485760}
trasck.attachments.max-download-bytes=${TRASCK_ATTACHMENTS_MAX_DOWNLOAD_BYTES:52428800}
trasck.attachments.allowed-content-types=${TRASCK_ATTACHMENTS_ALLOWED_CONTENT_TYPES:text/plain,text/markdown,text/csv,application/json,application/pdf,image/png,image/jpeg,image/gif,image/webp,application/zip,application/octet-stream}
trasck.exports.max-artifact-bytes=${TRASCK_EXPORTS_MAX_ARTIFACT_BYTES:52428800}
trasck.exports.allowed-content-types=${TRASCK_EXPORTS_ALLOWED_CONTENT_TYPES:application/json,text/csv,application/octet-stream}
trasck.imports.max-parse-bytes=${TRASCK_IMPORTS_MAX_PARSE_BYTES:5242880}
trasck.imports.allowed-content-types=${TRASCK_IMPORTS_ALLOWED_CONTENT_TYPES:text/csv,application/csv,application/json,text/json,text/plain}

# Development email provider
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
trasck.email.provider=${TRASCK_EMAIL_PROVIDER:maildev}
trasck.email.from=${TRASCK_EMAIL_FROM:no-reply@trasck.local}
trasck.automation.workers.fixed-delay-ms=${TRASCK_AUTOMATION_WORKERS_FIXED_DELAY_MS:30000}
trasck.imports.sample-jobs.enabled=${TRASCK_IMPORT_SAMPLE_JOBS_ENABLED:false}
